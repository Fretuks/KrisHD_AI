<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>FakeGPT Market</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<div class="market-shell card market-shell-simple">
    <header class="market-header market-header-simple">
        <div>
            <p class="eyebrow">Shared personas</p>
            <h1><span data-theme-name>FakeGPT</span> Market</h1>
            <p class="subtitle">A plain list of personas other people decided to share.</p>
        </div>
        <div class="market-header-actions">
            <button id="refreshMarket" class="secondary-action" type="button">Refresh</button>
            <a href="/settings" class="secondary-action">Settings</a>
            <a href="/" class="secondary-action">Back to chat</a>
        </div>
    </header>

    <div class="market-search">
        <label for="marketSearch">Search personas</label>
        <input id="marketSearch" type="search" placeholder="Search by name, creator, or description"/>
    </div>

    <p id="marketStatus" class="status persona-status">Loading market personas...</p>

    <div class="persona-market-columns market-page-columns">
        <div class="persona-market-column">
            <h3>AI personas</h3>
            <div id="marketPersonaList" class="persona-list"></div>
        </div>
        <div class="persona-market-column">
            <h3>User personas</h3>
            <div id="marketUserPersonaList" class="persona-list"></div>
        </div>
    </div>
</div>

<div id="marketPreviewModal" class="modal-overlay hidden">
    <div class="modal-card market-preview-card">
        <div class="modal-header">
            <div>
                <p class="eyebrow">Persona preview</p>
                <h3 id="marketPreviewName">Persona details</h3>
            </div>
            <button id="marketPreviewClose" type="button" class="icon-button">Close</button>
        </div>
        <div class="market-preview-body">
            <p id="marketPreviewMeta" class="persona-guidance"></p>
            <div class="market-preview-details">
                <div>
                    <h4>Pronouns</h4>
                    <p id="marketPreviewPronouns"></p>
                </div>
                <div>
                    <h4>Appearance</h4>
                    <p id="marketPreviewAppearance"></p>
                </div>
                <div>
                    <h4>Background</h4>
                    <p id="marketPreviewBackground"></p>
                </div>
                <div>
                    <h4>Details</h4>
                    <p id="marketPreviewDetails"></p>
                </div>
            </div>
        </div>
        <div class="market-preview-actions">
            <button id="marketPreviewConfirm" type="button" class="primary-action">Take persona</button>
            <button id="marketPreviewCancel" type="button" class="secondary-action">Cancel</button>
        </div>
    </div>
</div>
<script src="market.js" defer></script>
</body>
</html>
